<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identifikasi Spesies Ikan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <h1>🐟 Identifikasi Spesies Ikan</h1>
    <p>Aplikasi berbasis web untuk mengidentifikasi spesies ikan menggunakan sekuens DNA.</p>
    <button onclick="scrollKeForm()">Mulai Identifikasi</button>
  </header>

  <main class="container" id="form-section">
    <section class="card">
      <h2>Input Sekuens DNA</h2>
      <p>Masukkan sekuens DNA ikan pada kolom berikut.</p>

      <textarea id="dnaInput" placeholder="Contoh: ATGCGTACGTTAGC..."></textarea>

      <button onclick="identifikasiIkan()">Proses Identifikasi</button>

      <div id="loading" class="loading"></div>
      <div id="hasil" class="hasil"></div>
    </section>
  </main>

  <footer>
    <p>Software Development Kelompok 3</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
